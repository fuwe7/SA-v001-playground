<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Анализатор броска</title>
  <style>
    :root { --bg:#0f1115; --card:#181b22; --line:#262b35; --fg:#e8eaed; --muted:#9aa3af;
            --accent:#ff7a18; --good:#39d353; --bad:#f85149; }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:var(--fg);
           font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif; }
    .wrap { max-width:900px; margin:0 auto; padding:24px 16px 64px; }
    h1 { font-size:1.6rem; margin:8px 0 4px; }
    .sub { color:var(--muted); margin:0 0 24px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:12px;
            padding:20px; margin:16px 0; }
    a { color:var(--accent); }
    .err { background:#2a1416; border:1px solid var(--bad); color:#ffb3ad;
           padding:12px 16px; border-radius:10px; margin:12px 0; }
    table { width:100%; border-collapse:collapse; font-size:0.95rem; }
    th, td { text-align:left; padding:8px 10px; border-bottom:1px solid var(--line); }
    th { color:var(--muted); font-weight:600; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; }
    .stat { background:#11141a; border:1px solid var(--line); border-radius:10px; padding:12px; }
    .stat .k { color:var(--muted); font-size:0.8rem; }
    .stat .v { font-size:1.3rem; margin-top:4px; }
    .na { color:var(--muted); }
    video { width:100%; border-radius:10px; background:#000; }
    button, .btn { background:var(--accent); color:#1a1108; border:0; border-radius:10px;
                   padding:12px 20px; font-size:1rem; font-weight:600; cursor:pointer; }
    input[type=file] { color:var(--fg); }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🏀 Анализатор баскетбольного броска</h1>
    <p class="sub">Загрузите видео броска — получите скелет, углы и метрики.</p>
    {% block body %}{% endblock %}
  </div>
</body>
</html>
